<!doctype html>
<html lang="en">
{% include head.html %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

body.long-way-layout {
  --lw-bg: #f3e9d4;
  --lw-paper: #f8efdb;
  --lw-text: #2e2018;
  --lw-text-soft: #5c4a36;
  --lw-text-dim: #8a7558;
  --lw-accent: #a8593c;
  --lw-accent-hi: #c47155;
  --lw-border: #c4b08c;
  --lw-divider: #d4c3a1;

  --nav-link: #8a5034; --nav-link-hover: #a8593c;
  --ident-color: #8a7558; --ident-border: #c4b08c;
  --footer-border: #c4b08c; --footer-label: #8a7558;
  --footer-link: #8a5034; --footer-link-hover: #a8593c; --footer-dim: #8a7558;

  background: var(--lw-bg) !important;
  background-image:
    radial-gradient(at 12% 8%, rgba(168,89,60,0.04) 0%, transparent 35%),
    radial-gradient(at 88% 92%, rgba(168,89,60,0.05) 0%, transparent 40%);
  color: var(--lw-text) !important;
  font-family: 'Newsreader', Georgia, serif !important;
  min-height: 100vh; overflow-x: hidden;
  margin: 0 !important; max-width: 100% !important; padding: 0 !important;
  font-size: 19px; line-height: 1.7;
}

body.long-way-layout * { box-sizing: border-box; }

.lw__wrap { max-width: 600px; margin: 0 auto; padding: 56px 32px 80px; position: relative; }

.lw__eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--lw-text-dim); margin: 0 0 28px; opacity: 0; animation: lw-rise 0.5s ease-out 0.05s forwards; }

.lw__title { font-family: 'Newsreader', Georgia, serif !important; font-size: 4.6rem !important; font-weight: 400 !important; color: var(--lw-text) !important; letter-spacing: -0.025em !important; line-height: 1.02 !important; margin: 0 0 22px !important; text-decoration: none !important; opacity: 0; animation: lw-rise 0.6s ease-out 0.12s forwards; }

.lw__subtitle { font-family: 'Newsreader', Georgia, serif; font-size: 1.22rem; font-style: italic; font-weight: 300; color: var(--lw-text-soft); margin: 0 0 8px; line-height: 1.5; max-width: 520px; opacity: 0; animation: lw-rise 0.5s ease-out 0.2s forwards; }

.lw__divider { display: flex; justify-content: center; margin: 44px 0 36px; opacity: 0; animation: lw-rise 0.4s ease-out 0.28s forwards; }
.lw__divider-glyph { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: var(--lw-text-dim); letter-spacing: 0.5em; }

.lw__content { opacity: 0; animation: lw-rise 0.5s ease-out 0.32s forwards; }
.lw__content p { color: var(--lw-text) !important; margin: 0 0 1.4em !important; line-height: 1.78; font-size: 1.12rem; font-family: 'Newsreader', serif !important; }
.lw__content p:first-of-type { font-size: 1.24rem !important; line-height: 1.65 !important; }
.lw__content strong { color: var(--lw-text) !important; font-weight: 500; }
.lw__content em { color: var(--lw-accent) !important; font-style: italic; font-weight: 400; }

.lw__content a { color: var(--lw-accent) !important; text-decoration: none !important; border-bottom: 1px solid var(--lw-divider); background: none !important; transition: color 0.15s, border-color 0.15s; }
.lw__content a:hover { color: var(--lw-accent-hi) !important; border-color: var(--lw-accent); background: none !important; }

.lw__content hr { border: none; height: 1px; margin: 2.4em auto !important; width: 80px; background: var(--lw-divider); position: relative; overflow: visible; }
.lw__content hr::after { content: '·'; position: absolute; left: 50%; top: -1em; transform: translateX(-50%); background: var(--lw-bg); padding: 0 14px; color: var(--lw-text-dim); font-size: 1.6rem; line-height: 1; }

.lw__form { margin: 40px 0 32px; padding: 28px; background: var(--lw-paper); border: 1px solid var(--lw-border); position: relative; opacity: 0; animation: lw-rise 0.5s ease-out 0.4s forwards; }
.lw__form-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.66rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--lw-text-dim); margin: 0 0 14px; }
.lw__form-row { display: flex; gap: 8px; }
.lw__form-input { flex: 1; padding: 14px 16px; background: rgba(255,255,255,0.55); border: 1px solid var(--lw-border); color: var(--lw-text); font-family: 'Newsreader', serif; font-size: 1rem; font-style: italic; }
.lw__form-input::placeholder { color: var(--lw-text-dim); font-style: italic; }
.lw__form-input:focus { outline: none; border-color: var(--lw-accent); background: rgba(255,255,255,0.8); }
.lw__form-button { padding: 14px 24px; background: var(--lw-accent); color: var(--lw-paper); font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; border: 1px solid var(--lw-accent); cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.lw__form-button:hover { background: var(--lw-accent-hi); border-color: var(--lw-accent-hi); }
.lw__form-note { font-family: 'Newsreader', serif; font-style: italic; font-size: 0.88rem; color: var(--lw-text-dim); margin: 12px 0 0; line-height: 1.5; }

.lw__signoff { margin-top: 40px; font-family: 'Newsreader', serif; opacity: 0; animation: lw-rise 0.4s ease-out 0.5s forwards; }
.lw__signoff p { margin: 0 0 4px !important; color: var(--lw-text-soft) !important; line-height: 1.5; font-size: 1.12rem; font-style: italic; }
.lw__signoff-name { display: block; margin-top: 6px !important; color: var(--lw-text) !important; font-family: 'Newsreader', serif !important; font-style: italic !important; font-size: 1.15rem !important; }

@keyframes lw-rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 560px) {
  .lw__wrap { padding: 40px 24px 60px; }
  .lw__title { font-size: 3.2rem !important; line-height: 1.05 !important; }
  .lw__subtitle { font-size: 1.1rem; }
  .lw__content p { font-size: 1.05rem; }
  .lw__content p:first-of-type { font-size: 1.15rem !important; }
  .lw__form-row { flex-direction: column; }
  .lw__form-button { width: 100%; }
  .lw__form { padding: 22px; }
}

@media (prefers-color-scheme: dark) {
  body.long-way-layout {
    --lw-bg: #1c1410;
    --lw-paper: #221912;
    --lw-text: #ece0c8;
    --lw-text-soft: #b8a888;
    --lw-text-dim: #7a6a52;
    --lw-accent: #d68b73;
    --lw-accent-hi: #e8a08a;
    --lw-border: #3a2e22;
    --lw-divider: #2a221a;

    --nav-link: #d68b73; --nav-link-hover: #e8a08a;
    --footer-border: #3a2e22; --footer-label: #7a6a52;
    --footer-link: #d68b73; --footer-link-hover: #e8a08a; --footer-dim: #7a6a52;
  }
  body.long-way-layout {
    background-image:
      radial-gradient(at 12% 8%, rgba(214,139,115,0.05) 0%, transparent 35%),
      radial-gradient(at 88% 92%, rgba(214,139,115,0.04) 0%, transparent 40%);
  }
  .lw__form-input { background: rgba(255,255,255,0.04); color: var(--lw-text); }
  .lw__form-input:focus { background: rgba(255,255,255,0.07); }
  .lw__form-button { color: var(--lw-bg); }
  .lw__form-button:hover { color: var(--lw-bg); }
  .lw__content hr::after { background: var(--lw-bg); }
}
</style>
<body class="long-way-layout">
  <main class="lw__wrap">
    {% include nav.html %}

    <p class="lw__eyebrow">A LETTER · ROUGHLY EVERY TWO WEEKS</p>

    <h1 class="lw__title">The Long Way</h1>

    <p class="lw__subtitle">{{ page.subtitle }}</p>

    <div class="lw__divider"><span class="lw__divider-glyph">· · ·</span></div>

    <div class="lw__content">{{ content }}</div>

    {% include footer.html %}
  </main>
</body>
</html>
