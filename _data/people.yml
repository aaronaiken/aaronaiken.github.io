 short-about: A guy in Harrisburg who builds his own tools, makes things by hand, and writes. A few years back my life came apart and I buried myself under six figures of debt; in 2024 God broke in — with a sledgehammer, not a whisper — and started putting me back together. My focuses now are dead simple, and I love it that way — God, family, others. I wrote a book about climbing out, called <a href="/splinched">Splinched</a>. <a href="https://www.bible.com/bible/59/MAT.11.28-30" target="_blank" rel="noopener noreferrer" title="Come to me, all who labor and are heavy laden, and I will give you rest. Take my yoke upon you, and learn from me, for I am gentle and lowly in heart, and you will find rest for your souls. For my yoke is easy, and my burden is light.">Matthew 11:28-30</a>.
 post-bio: Aaron has finally stopped living life according to his own terms. <a href="https://www.bible.com/bible/59/MAT.11.28-30" target="_blank" rel="noopener noreferrer" title="Come to me, all who labor and are heavy laden, and I will give you rest. Take my yoke upon you, and learn from me, for I am gentle and lowly in heart, and you will find rest for your souls. For my yoke is easy, and my burden is light.">Matthew 11:28-30</a>. God took him back, cleaned out his heart, turned all of the lights on, and is shaping his life daily.
