# The Workbench — the source of truth for the /tools/ page.
# Add a thing: append to `tools` below. Move it between sections: change `group`.
# Put it up top for a while: set `featured: true`. That's it — no HTML to edit.
#
# status  -> live | online | docs | soon | blueprint  (drives the dot + label)
# group   -> must match a `groups` id below
# icon    -> an emoji; OR set family_icon: true for the Tidy 4-dot mark
# external-> true for off-site links (adds rel=noopener); omit for on-site

groups:
  - { id: publish,  label: "WRITE & PUBLISH" }
  - { id: rhythms,  label: "DAILY RHYTHMS" }
  - { id: mac,      label: "MAC UTILITIES" }
  - { id: toys,     label: "WEB EXPERIMENTS" }
  - { id: money,    label: "SHOP & SUPPORT" }
  - { id: books,    label: "BOOKS" }
  - { id: private,  label: "THE SHIP'S SYSTEMS · PRIVATE" }

tools:
  - name: Letters from Paul
    url: https://lettersfrompaul.day
    external: true
    icon: "⛵"
    status: live
    group: rhythms
    featured: true
    cta: VISIT
    blurb: >
      A slow daily walk through the apostle Paul's letters, in his own voice — a
      passage each morning, plus a place to write to him and receive a real letter
      back. ESV-clean readings, illustrated voyage maps, generated on Claude. Flask
      + SQLite on Fly.
    tags: [Flask, Claude, Resend, "Fly.io"]

  - name: Endpaper
    url: https://endpaper.day
    external: true
    icon: "📖"
    status: live
    group: publish
    featured: true
    cta: VISIT
