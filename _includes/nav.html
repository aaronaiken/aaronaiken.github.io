<nav class="site-nav">
  {%- for item in site.data.nav.primary -%}
  <a href="{{ item.url | relative_url }}" title="{{ item.title }}">{{ item.label }}</a>{% unless forloop.last %} |{% endunless %}
  {%- endfor -%}
</nav>
{% if page.page_ident %}
  {% assign ident_parts = page.page_ident | split: " · " %}
  <div class="page-ident">
    <span class="page-ident__label">{{ ident_parts[0] }}</span>
    {% if ident_parts[1] %}
      <span class="page-ident__divider">·</span>
      <span class="page-ident__sub">{{ ident_parts[1] }}</span>
    {% endif %}
  </div>
{% endif %}
