<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>NOTEBOOK // 48 PAGES</title>
	<link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
	<link rel="shortcut icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
	<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='cockpit.css') }}?v={{ asset_v }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='notebook.css') }}?v={{ asset_v }}">
</head>
<body class="nb-body">
	<div class="nb-fs">
		<div class="nb-fs-bar">
			<div class="nb-fs-brand">
				<span class="nb-fs-title">NOTEBOOK</span>
				<a href="/publish" title="Back to the cockpit (Esc)">← COCKPIT</a>
			</div>
			<div class="nb-fs-meta">
				<span id="nb-page-status">saved</span>
			</div>
		</div>

		<!-- PAGE METER — 48 discrete page ticks across the top (the 48pages budget bar).
		     Fills left→right as pages fill; red tick marks PG 39 = triage; bleeds red past it. -->
		<div class="nb-meter" id="nb-meter">
			<span class="nb-meter-cap">PG&nbsp;1</span>
			<div class="nb-meter-ticks" id="nb-meter-ticks"></div>
			<span class="nb-meter-read" id="nb-page-gauge">PG 0/48 · 48 LEFT</span>
		</div>

		<div class="nb-fs-body">
			<!-- LEFT PAGE — scrap paper. Scrap = block between blank lines. -->
			<div class="nb-fs-page" id="nb-fs-page">
				<div class="nb-triage-banner" id="nb-triage-banner">PAGE HEAVY — FILE, ROLL, OR TEAR TO KEEP WRITING</div>
				<div class="nb-scrap-bar" id="nb-scrap-bar">
					<span class="nb-scrap-what" id="nb-scrap-what">—</span>
					<button type="button" onclick="nbRollCurrent()" title="Roll to Below Deck (Ctrl+Enter)">→ ROLL</button>
					<button type="button" onclick="nbTearCurrent()" title="Tear this scrap (Del-hold)">⌦ TEAR</button>
				</div>
				<textarea id="nb-page-input" spellcheck="true"
				          placeholder="the page — a blank line starts a new scrap">{{ page }}</textarea>
				<div class="nb-fs-hints">CTRL+ENTER ROLL · ⌦ TEAR · ESC COCKPIT · A BLANK LINE STARTS A NEW SCRAP</div>
			</div>

			<div class="nb-spine"></div>

			<!-- RIGHT PAGE — the live Below Deck kneeboard (same source of truth). -->
			<div class="nb-fs-right">
				<div class="nb-right-head">
					<span class="nb-fs-sub">// Below Deck</span>
					<a href="/below-deck" class="nb-right-open" title="Full Below Deck">↗</a>
				</div>
				<div class="nb-bd-add">
					<input type="text" id="nb-bd-input" placeholder="new task…" maxlength="140"
					       onkeydown="if(event.key==='Enter'){event.preventDefault();nbBdAdd();}">
					<button type="button" onclick="nbBdAdd()">+ LOG</button>
				</div>
				<ul class="nb-bd-list" id="nb-bd-list"></ul>
			</div>
		</div>
	</div>

	<script src="{{ url_for('static', filename='notebook.js') }}?v={{ asset_v }}"></script>
</body>
</html>
