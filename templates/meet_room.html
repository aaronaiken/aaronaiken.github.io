<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>meeting · cockpit</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='meet.css') }}">
</head>
<body class="meet-room">
  <div id="name-gate" class="gate">
    <div class="gate-card">
      <h2>join the meeting</h2>
      <input id="name-input" type="text" placeholder="your name" maxlength="40" autocomplete="name">
      <button id="join-btn" class="btn-primary">JOIN</button>
      <p class="gate-note">your browser will ask for camera + mic.</p>
      <p id="gate-error" class="gate-error"></p>
    </div>
  </div>

  <div id="stage" class="stage hidden">
    <div id="grid" class="grid"></div>
    <div class="bar">
      <button id="mic-btn" class="ctl" title="mute / unmute mic"><span>🎙️</span><em>mic</em></button>
      <button id="cam-btn" class="ctl" title="camera on / off"><span>📷</span><em>cam</em></button>
      <button id="screen-btn" class="ctl" title="share your screen"><span>🖥️</span><em>share</em></button>
      <button id="blur-btn" class="ctl" title="blur your background"><span>✨</span><em>blur</em></button>
      <button id="copy-btn" class="ctl" title="copy the invite link"><span>🔗</span><em>invite</em></button>
      <button id="notes-btn" class="ctl" title="notes"><span>📝</span><em>notes</em></button>
      <button id="leave-btn" class="ctl danger" title="leave / end the meeting"><span>✕</span><em>leave</em></button>
      <span id="status" class="status"></span>
    </div>
  </div>

  <aside id="notes-panel" class="notes-panel hidden">
    <div class="notes-head"><span>shared notes</span><button id="notes-close" class="notes-x" title="close">✕</button></div>
    <label class="notes-mine-label">your notes — everyone in the room sees these</label>
    <textarea id="notes-text" placeholder="jot things down…"></textarea>
    <div id="notes-others" class="notes-others"></div>
    <div class="notes-actions">
      <button id="notes-copy" class="mini">copy all</button>
      <span id="notes-saved" class="notes-saved"></span>
    </div>
  </aside>

  <div id="ended" class="ended hidden">
    <div class="ended-card">
      <h2 id="ended-title">meeting ended</h2>
      <label class="ended-label">notes</label>
      <textarea id="ended-notes" readonly placeholder="(no notes taken)"></textarea>
      <div class="ended-actions">
        <button id="ended-copy" class="btn-primary">COPY NOTES</button>
        <a id="ended-rejoin" class="btn-ghost hidden" href="">REJOIN</a>
        <a id="ended-new" class="btn-ghost hidden" href="/meet">NEW MEETING</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
  <script>
    window.MEET = {
      room: {{ room_id|tojson }},
      isHost: {{ 'true' if is_host else 'false' }}
    };
  </script>
  <script src="{{ url_for('static', filename='meet.js') }}?v=6"></script>
</body>
</html>
