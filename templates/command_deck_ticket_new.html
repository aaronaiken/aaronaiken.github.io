<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>New ticket · Command Deck</title>
  <link rel="stylesheet" href="/static/command_deck.css">
</head>
<body class="command-deck">
<div class="cd-shell">

  <!-- HEADER -->
  <header class="cd-header">
    <div class="cd-header-left">
      <a href="/command-deck/" class="cd-wordmark">COMMAND DECK</a>
      <span class="cd-ident">TICKETS · NEW</span>
    </div>
    <nav class="cd-header-nav">
      <a href="/command-deck/" class="cd-nav-link">BRIDGE</a>
      <span class="cd-nav-sep">·</span>
      <a href="/command-deck/tickets/" class="cd-nav-link">TICKETS</a>
      <span class="cd-nav-sep">·</span>
      <a href="/command-deck/settings/" class="cd-nav-link">SETTINGS</a>
    </nav>
  </header>

  <div class="cd-main full-width">

    <div class="cd-breadcrumb">
      <a href="/command-deck/tickets/">Tickets</a>
      <span class="cd-breadcrumb-sep">›</span>
      <span class="cd-breadcrumb-tail">New ticket</span>
    </div>

    <h1 class="cd-page-title">// New Ticket</h1>

    <form id="ticketNewForm" class="cd-ticket-form" method="POST" action="/command-deck/tickets/new">

      <label class="cd-ticket-field">
        <span class="cd-ticket-field-label">Title</span>
        <input type="text" name="title" class="cd-input cd-ticket-input"
               placeholder="Login button doesn't work on Safari"
               required autofocus>
      </label>

      <label class="cd-ticket-field">
        <span class="cd-ticket-field-label">Customer</span>
        <select name="customer_id" class="cd-input cd-ticket-input" id="customerSelect">
          <option value="">— pick a customer —</option>
          {% for c in customers %}
            <option value="{{ c.id }}" data-group-id="{{ c.customer_group_id or '' }}">{{ c.name }}{% if c.email %} · {{ c.email }}{% endif %}</option>
          {% endfor %}
          <option value="__add_new__">＋ add new customer…</option>
        </select>
      </label>

      <!-- Inline customer add (revealed when "+ add new" is selected) -->
      <fieldset id="customerNewBlock" class="cd-ticket-customer-add" hidden>
        <legend>New customer</legend>
        <input type="text" id="newCustomerName" class="cd-input cd-ticket-input" placeholder="name (e.g. Jane Smith)">
        <input type="email" id="newCustomerEmail" class="cd-input cd-ticket-input" placeholder="email (optional)">
        <select id="newCustomerGroup" class="cd-input cd-ticket-input">
          <option value="">— group (optional) —</option>
          {% for g in customer_groups %}
            <option value="{{ g.id }}">{{ g.name }}</option>
          {% endfor %}
        </select>
        <div class="cd-ticket-customer-add-actions">
          <button type="button" class="cd-btn ghost" id="newCustomerCancel">CANCEL</button>
          <button type="button" class="cd-btn primary" id="newCustomerSave">SAVE CUSTOMER</button>
        </div>
      </fieldset>

      <label class="cd-ticket-field">
        <span class="cd-ticket-field-label">Customer Group</span>
        <select name="customer_group_id" class="cd-input cd-ticket-input" id="groupSelect">
          <option value="">— none —</option>
          {% for g in customer_groups %}
            <option value="{{ g.id }}">{{ g.name }}</option>
          {% endfor %}
        </select>
        <span class="cd-ticket-hint">— auto-fills from customer; override here if needed</span>
      </label>

      <label class="cd-ticket-field">
        <span class="cd-ticket-field-label">Project</span>
        <select name="project_id" class="cd-input cd-ticket-input" id="projectSelect">
          <option value="">— none —</option>
          {% for p in projects %}
            <option value="{{ p.id }}" {% if query_project_id == p.id %}selected{% endif %}>{{ p.title }}</option>
          {% endfor %}
        </select>
      </label>

      <label class="cd-ticket-field">
        <span class="cd-ticket-field-label">Type</span>
        <select name="type_id" class="cd-input cd-ticket-input" required>
          {% for t in ticket_types %}
            <option value="{{ t.id }}" {% if t.name == 'other' %}selected{% endif %}>{{ t.name }}</option>
          {% endfor %}
        </select>
      </label>

      <fieldset class="cd-ticket-field cd-ticket-priority">
        <legend class="cd-ticket-field-label">Priority</legend>
        <label><input type="radio" name="priority" value="normal" checked> Normal</label>
        <label><input type="radio" name="priority" value="urgent"> Urgent</label>
      </fieldset>

      <label class="cd-ticket-field">
        <span class="cd-ticket-field-label">Description</span>
        <textarea name="description" class="cd-input cd-ticket-input" rows="6"
                  placeholder="What's the issue? Include reproduction steps if relevant."></textarea>
      </label>

      <div class="cd-ticket-form-actions">
        <a class="cd-btn ghost" href="/command-deck/tickets/">CANCEL</a>
        <button type="submit" class="cd-btn primary">CREATE TICKET</button>
      </div>
    </form>

  </div><!-- .cd-main -->

  <footer class="cd-footer">
    <div class="cd-footer-links">
      <a href="/command-deck/tickets/" class="cd-footer-link">All tickets</a>
    </div>
    {% include 'includes/cd_footer_status.html' %}
    <span class="cd-footer-ident">YT-1300F · COMMAND DECK · SECURE</span>
  </footer>

</div><!-- .cd-shell -->

<script>
(function () {
  var customerSelect = document.getElementById('customerSelect');
  var customerNewBlock = document.getElementById('customerNewBlock');
  var newName = document.getElementById('newCustomerName');
  var newEmail = document.getElementById('newCustomerEmail');
  var newGroup = document.getElementById('newCustomerGroup');
  var newCancel = document.getElementById('newCustomerCancel');
  var newSave = document.getElementById('newCustomerSave');
  var groupSelect = document.getElementById('groupSelect');

  // Auto-fill customer group when a customer is picked
  customerSelect.addEventListener('change', function () {
    if (customerSelect.value === '__add_new__') {
      customerNewBlock.removeAttribute('hidden');
      newName.focus();
      // Suggest the currently-selected group, if any, as the new customer's
      // group default.
      if (groupSelect.value) newGroup.value = groupSelect.value;
      return;
    }
    customerNewBlock.setAttribute('hidden', '');
    var opt = customerSelect.options[customerSelect.selectedIndex];
    var groupId = opt && opt.dataset.groupId;
    if (groupId) groupSelect.value = groupId;
  });

  newCancel.addEventListener('click', function () {
    customerNewBlock.setAttribute('hidden', '');
    customerSelect.value = '';
    newName.value = '';
    newEmail.value = '';
    newGroup.value = '';
  });

  newSave.addEventListener('click', function () {
    var name = (newName.value || '').trim();
    if (!name) { newName.focus(); return; }
    newSave.disabled = true;
    fetch('/command-deck/lookups/customers/new', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        email: newEmail.value || null,
        customer_group_id: newGroup.value || null,
      }),
    })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        newSave.disabled = false;
        if (!d.success) {
          alert('Could not save: ' + (d.error || 'unknown'));
          return;
        }
        // Insert the new customer just before the "+ add new" sentinel and
        // select it.
        var newOpt = document.createElement('option');
        newOpt.value = d.row.id;
        newOpt.textContent = d.row.name + (d.row.email ? ' · ' + d.row.email : '');
        if (d.row.customer_group_id) newOpt.dataset.groupId = d.row.customer_group_id;
        var sentinel = customerSelect.querySelector('option[value="__add_new__"]');
        customerSelect.insertBefore(newOpt, sentinel);
        customerSelect.value = String(d.row.id);
        if (d.row.customer_group_id) groupSelect.value = String(d.row.customer_group_id);
        customerNewBlock.setAttribute('hidden', '');
        newName.value = '';
        newEmail.value = '';
        newGroup.value = '';
      })
      .catch(function () {
        newSave.disabled = false;
        alert('Network error.');
      });
  });

  // Strip the "__add_new__" sentinel from the form on submit so the server
  // doesn't try to parse it as an int (also belt-and-suspenders if user
  // picked it but never filled out the new-customer form).
  document.getElementById('ticketNewForm').addEventListener('submit', function () {
    if (customerSelect.value === '__add_new__') customerSelect.value = '';
  });
})();
</script>
<script src="/static/command_deck_nav.js"></script>
</body>
</html>
