<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cockpit</title>

    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

    <style>
    :root {
        --bg: #000; --text: #eee; --input-bg: #0a0a0a; --accent: #0a84ff; --border: #333;
        --pill-bg: #111; --shield: #4bb543; --heat: rgba(10, 132, 255, 0);
        --muted: #aaa; --secret-neon: #ff00ff;
    }

    [data-theme="light"] {
        --bg: #f2f2f7; --text: #1c1c1e; --input-bg: #fff; --accent: #007aff; --border: #c6c6c8;
        --pill-bg: #e5e5ea; --muted: #555;
    }

    body {
        background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace;
        margin: 0; display: flex; justify-content: center; overscroll-behavior-y: contain;
        overflow-x: hidden; padding-top: env(safe-area-inset-top, 20px);
        transition: background 0.3s ease;
    }

    /* Scanline Drift Animation */
    @keyframes scanline-drift {
        0% { transform: translateY(0); }
        100% { transform: translateY(100%); }
    }

    body::before {
        content: " "; display: block; position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                    linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
        z-index: 9999; pointer-events: none; background-size: 100% 4px, 3px 100%;
        animation: scanline-drift var(--scan-speed, 10s) linear infinite;
        opacity: 0.15;
    }

    .container { width: 100%; max-width: 500px; padding: 20px; transition: transform 0.6s cubic-bezier(0.5, 0, 0.5, 1), opacity 0.4s ease-in; }
    .hyperspace { transform: scale(0.1) translateY(-1000px); filter: blur(20px); opacity: 0; pointer-events: none; }

    /* Status Bar & Shields */
    .status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .systems-group { display: flex; align-items: center; gap: 12px; }

    .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 5px currentColor; }
    .online { background: #4bb543; color: #4bb543; }
    .syncing { background: #ffd700; color: #ffd700; }
    .offline { background: #ff4500; color: #ff4500; }

    .shield-meter { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .shield-bar { width: 50px; height: 4px; background: #111; border-radius: 2px; overflow: hidden; border: 1px solid #333; }
    .shield-fill { height: 100%; width: 0%; background: var(--shield); transition: width 0.5s, background 0.5s; box-shadow: 0 0 8px var(--shield); }

    /* Secret Comms Overlay - Fixed Centering & No Selection */
    #secret-comm {
        position: fixed; top: 0; left: 0;
        width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.98); z-index: 10000;
        display: none; flex-direction: column;
        align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.5s ease;
        padding: 30px; box-sizing: border-box; /* Keeps content inside edges */
        user-select: none; -webkit-user-select: none; /* Prevents long-press highlight */
        touch-action: none; /* Prevents scrolling while secret is open */
    }

    #secret-text {
        color: var(--secret-neon);
        font-size: 1.2rem;
        text-shadow: 0 0 15px var(--secret-neon);
        letter-spacing: 2px;
        text-align: center;
        max-width: 100%;
        word-wrap: break-word;
        overflow-wrap: break-word; /* Forces wrap on mobile */
        line-height: 1.5;
    }

    /* The Pulsing Terminal Cursor */
    .terminal-cursor {
        display: inline-block;
        width: 10px;
        height: 1.2rem; /* Matches your secret-text font size */
        background: var(--secret-neon);
        margin-left: 8px;
        vertical-align: middle;
        box-shadow: 0 0 8px var(--secret-neon);
        animation: blink 1s step-end infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

    /* UI Elements */
    .scroller { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
    .scroller::-webkit-scrollbar { display: none; }
    .pill { background: var(--pill-bg); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: 0.2s; }
    .pill:active { background: var(--accent); color: #fff; }
    .util { font-weight: bold; border-color: var(--accent); color: var(--accent); }

    .input-wrap { position: relative; margin-top: 10px; }
    textarea {
        width: 100%; height: 180px; background: var(--input-bg); color: var(--text);
        border: 1px solid var(--border); border-radius: 4px; padding: 15px; font-size: 16px;
        outline: none; box-sizing: border-box; resize: none; -webkit-appearance: none;
        box-shadow: 0 0 20px var(--heat); transition: box-shadow 0.2s ease, border-color 0.2s;
        font-family: inherit;
    }

    @keyframes redline-pulse {
        0% { box-shadow: 0 0 10px rgba(255, 69, 0, 0.2); }
        50% { box-shadow: 0 0 30px rgba(255, 69, 0, 0.6); }
        100% { box-shadow: 0 0 10px rgba(255, 69, 0, 0.2); }
    }
    .redline { animation: redline-pulse 1.5s infinite ease-in-out; border-color: #ff4500 !important; }

    button#publish-btn {
        width: 100%; background: none; border: 1px solid var(--accent); color: var(--accent);
        padding: 15px; border-radius: 4px; font-size: 14px; font-family: inherit; font-weight: bold;
        text-transform: uppercase; letter-spacing: 3px; margin-top: 20px; cursor: pointer;
        transition: 0.3s;
    }
    button#publish-btn:active { background: var(--accent); color: #000; }

    .history-section { margin-top: 40px; }
    .log-header { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
    .history-item { color: var(--muted); font-size: 13px; margin-bottom: 12px; line-height: 1.4; border-left: 2px solid var(--accent); padding-left: 10px; }

    @media (min-width: 768px) {
        .container {
            margin-top: 50px; border: 1px solid var(--border); border-radius: 20px;
            background: rgba(28, 28, 30, 0.5); backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
    }

    #payload-label {
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    }

    #payload-label:hover {
        background: rgba(255, 0, 255, 0.1); /* Subtle neon glow */
        box-shadow: 0 0 5px var(--accent);
    }

    #payload-name {
        font-weight: bold;
        text-shadow: 0 0 5px var(--secret-neon);
    }
</style>
</head>
<body>
    <div id="secret-comm">
        <div id="secret-text"></div>
    </div>

    <div class="container" id="main-cockpit">
        <div class="status-bar">
            <div class="systems-group">
                <div class="dot {{ git_status if git_status else 'online' }}"></div>
                <div class="shield-meter">
                    SHIELDS <div class="shield-bar"><div id="shield-fill" class="shield-fill"></div></div>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button style="background:none; border:none; color:var(--muted); font-size:12px; font-family:inherit; cursor:pointer;" onclick="toggleTheme()">THEME</button>
                <a href="/logout" style="color:var(--muted); text-decoration:none; font-size:12px;">OFF</a>
            </div>
        </div>

        <div class="scroller">
            <button class="pill" onclick="insertText('🚀')">🚀</button>
            <button class="pill"
                style="user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;"
                onclick="insertText('🛰️')"
                ontouchstart="startSecret()"
                ontouchend="endSecret()"
                oncontextmenu="event.preventDefault(); triggerDesktopSecret(); return false;">
                🛰️
            </button>
            <button class="pill" onclick="insertText('☕️')">☕️</button>
            <button class="pill" onclick="insertText('💻')">💻</button>
            <button class="pill" onclick="insertText('🛠️')">🛠️</button>
        </div>

        <div class="scroller utility-belt">
            <button class="pill util" onclick="wrapText('**', '**')">B</button>
            <button class="pill util" onclick="wrapText('*', '*')">I</button>
            <button class="pill util" onclick="smartURL()">🔗 Link</button>
        </div>

        <div class="input-wrap">
            <form action="/publish" method="post" id="status-form" enctype="multipart/form-data">
                <textarea name="status" id="status-input" placeholder="READY FOR INPUT..." autofocus oninput="updateHUD()"></textarea>

                <div class="counter-wrap" style="display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--muted); margin-top: 5px;">
                    <div class="payload-controls">
                        <input type="file" name="image" id="image-upload" accept="image/*" style="display: none;">
                        <label for="image-upload" id="payload-label" style="cursor: pointer; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 3px;" onclick="playCockpitSound('payload');">
                            + ATTACH PAYLOAD
                        </label>
                        <span id="payload-name" style="margin-left: 8px; color: var(--secret-neon); display: none;">LOADED</span>
                    </div>

                    <div><span id="char-count">0</span>/280</div>
                </div>

                <button type="submit" id="publish-btn" onclick="playCockpitSound('success');">Execute Transmission</button>
            </form>
        </div>

        <div class="history-section">
            <div class="log-header">RECENT COMMS LOG</div>
            {% for post in history %}
            <div class="history-item">> {{ post }}</div>
            {% endfor %}
        </div>
    </div>

    <script>
        let cockpitAudioCtx; // Global variable
        const cockpit = document.getElementById('main-cockpit');
        const tx = document.getElementById('status-input');
        const secretDisplay = document.getElementById('secret-comm');
        const charCount = document.getElementById('char-count');

        let transmissions = [
            "Signal interference detected. Encryption holding...",
            "The nebula is thick tonight. Keep the link open.",
            "Waiting for your signal, Commander.",
            "Telemetric link established. Proceed with caution."
        ];

        function updateHUD() {
            const length = tx.value.length;
            charCount.innerText = length;
            const intensity = Math.min(length / 280, 1);
            tx.style.setProperty('--heat', `rgba(10, 132, 255, ${intensity * 0.4})`);
            if (length > 250) {
                tx.classList.add('redline');
                charCount.style.color = "#ff4500";
            } else {
                tx.classList.remove('redline');
                charCount.style.color = "var(--muted)";
            }
        }

        function updateSignalIntegrity() {
            const start = Date.now();
            fetch('/static/comms.txt', { method: 'HEAD', cache: 'no-store' })
                .then(() => {
                    const latency = Date.now() - start;
                    const fill = document.getElementById('shield-fill');
                    let integrity = Math.max(10, 100 - (latency / 5));
                    fill.style.width = integrity + '%';
                    const scanSpeed = Math.max(2, (latency / 50));
                    document.body.style.setProperty('--scan-speed', `${scanSpeed}s`);
                    if (latency > 300) {
                        fill.style.background = '#ff4500';
                        document.body.style.filter = "contrast(1.2) brightness(0.8)";
                    } else {
                        fill.style.background = integrity < 50 ? '#ffd700' : '#4bb543';
                        document.body.style.filter = "none";
                    }
                });
        }
        setInterval(updateSignalIntegrity, 30000);
        updateSignalIntegrity();

        // 1. Initialize the list from Python
        const availableComms = {{ comms_list|tojson }};

        function showSecret() {
            window.getSelection().removeAllRanges();
            if ("vibrate" in navigator) navigator.vibrate([30, 80]);
            // playChirp(880, 'square');
            playCockpitSound('transmission');

            // 2. Pick a NEW random one from the valid list every time
            let msg = availableComms[Math.floor(Math.random() * availableComms.length)];

            // 3. The "Daddy" Swap (Client-side)
            if (Math.random() < 0.3) {
                msg = msg.replace(/Aaron/gi, "Daddy");
            }

            const textTarget = document.getElementById('secret-text');
            textTarget.innerText = msg;

            const cursor = document.createElement('span');
            cursor.className = 'terminal-cursor';
            textTarget.appendChild(cursor);

            secretDisplay.style.display = 'flex';
            setTimeout(() => { secretDisplay.style.opacity = "1"; }, 10);

            setTimeout(() => {
                window.addEventListener('click', closeSecret, { once: true });
                window.addEventListener('touchstart', closeSecret, { once: true });
            }, 300);
        }

        function closeSecret() {
            secretDisplay.style.opacity = "0";
            setTimeout(() => { secretDisplay.style.display = 'none'; }, 500);
        }

        let secretTimer;
        function startSecret() { secretTimer = setTimeout(showSecret, 1500); }
        function endSecret() { clearTimeout(secretTimer); }
        function triggerDesktopSecret() { showSecret(); }

        function wrapText(before, after) {
            const start = tx.selectionStart, end = tx.selectionEnd;
            const selected = tx.value.substring(start, end);
            tx.value = tx.value.substring(0, start) + before + selected + after + tx.value.substring(end);
            updateHUD();
            tx.focus();
            tx.setSelectionRange(start + before.length, start + before.length + selected.length);
        }

        async function smartURL() {
            const start = tx.selectionStart, end = tx.selectionEnd;
            const selected = tx.value.substring(start, end) || "link text";
            try {
                const clipboard = await navigator.clipboard.readText();
                tx.value = tx.value.substring(0, start) + `[${selected}](${clipboard})` + tx.value.substring(end);
            } catch (e) { wrapText('[', '](url)'); }
            updateHUD();
        }

        function toggleTheme() {
            const target = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('cockpit-theme', target);
        }

        function insertText(val) {
            playChirp(440, 'sine');
            tx.value += (tx.value.length > 0 && !tx.value.endsWith(' ') ? ' ' : '') + val;
            updateHUD();
            tx.focus();
        }

        document.getElementById('status-form').addEventListener('submit', (e) => {
            if ("vibrate" in navigator) navigator.vibrate([30, 50, 30]);
            cockpit.classList.add('hyperspace');
            setTimeout(() => e.target.submit(), 450);
            e.preventDefault();
        });

        const savedTheme = localStorage.getItem('cockpit-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateHUD();

        let audioCtx;
        function playCockpitSound(type) {
            // 1. Initialize context only on the first ever click
            if (!cockpitAudioCtx) {
                cockpitAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            // 2. Wake up the audio if the browser put it to sleep
            if (cockpitAudioCtx.state === 'suspended') {
                cockpitAudioCtx.resume();
            }

            const osc = cockpitAudioCtx.createOscillator();
            const gain = cockpitAudioCtx.createGain();

            osc.connect(gain);
            gain.connect(cockpitAudioCtx.destination);
            const now = cockpitAudioCtx.currentTime;

            // --- WIRE 1: TRANSMISSION (The Satellite Chirp) ---
            if (type === 'transmission') {
                osc.type = 'square'; // Grittier, more "tech" than sine
                // Start high, drop fast to a lower "hum"
                osc.frequency.setValueAtTime(1600, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.15);

                // Second "harmonic" oscillator for that 2nd-tone shimmer
                const osc2 = cockpitAudioCtx.createOscillator();
                const gain2 = cockpitAudioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(880, now);
                osc2.frequency.exponentialRampToValueAtTime(110, now + 0.2);

                osc2.connect(gain2);
                gain2.connect(cockpitAudioCtx.destination);
                gain2.gain.setValueAtTime(0.05, now);
                gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);

                osc2.start(now);
                osc2.stop(now + 0.2);

                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
            }

            // --- WIRE 2: PAYLOAD (The Mechanical Thunk) ---
            else if (type === 'payload') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
                gain.gain.setValueAtTime(0.15, now);
            }

            else if (type === 'success') {
                osc.type = 'sine';
                // The "Data Linked" ascending blip
                osc.frequency.setValueAtTime(440, now); // A4
                osc.frequency.setValueAtTime(880, now + 0.08); // Jump to A5
                gain.gain.setValueAtTime(0.1, now);
            }

            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        }

        function updatePayloadStatus() {
            const fileInput = document.getElementById('image-upload');
            const label = document.getElementById('payload-label');
            const status = document.getElementById('payload-name');

            if (fileInput.files.length > 0) {
                label.style.borderColor = 'var(--secret-neon)';
                label.style.color = 'var(--secret-neon)';
                label.innerText = 'PAYLOAD READY';
                status.style.display = 'inline';

                // Brief pulse effect when file is selected
                status.style.animation = 'blink 0.5s step-end 3';
            }
        }
    </script>
</body>
</html>
