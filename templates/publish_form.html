<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cockpit</title>
    <style>
        :root {
            --bg: #000; --text: #fff; --input-bg: #0a0a0a; --accent: #0a84ff; --border: #222;
            --pill-bg: #111; --shield: #4bb543; --heat: rgba(10, 132, 255, 0);
        }

        [data-theme="light"] {
            --bg: #f2f2f7; --text: #000; --input-bg: #fff; --accent: #007aff; --border: #d1d1d6;
            --pill-bg: #e5e5ea;
        }

        body {
            background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace;
            margin: 0; display: flex; justify-content: center; overscroll-behavior-y: contain;
            overflow-x: hidden; padding-top: env(safe-area-inset-top, 20px);
        }

        .container { width: 100%; max-width: 500px; padding: 20px; transition: transform 0.6s cubic-bezier(0.5, 0, 0.5, 1), opacity 0.4s ease-in; }
        .hyperspace { transform: scale(0.1) translateY(-1000px); filter: blur(20px); opacity: 0; pointer-events: none; }

        /* Status Bar & Shields */
        .status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .systems-group { display: flex; align-items: center; gap: 12px; }

        .shield-meter { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #666; display: flex; align-items: center; gap: 8px; }
        .shield-bar { width: 50px; height: 3px; background: #111; border-radius: 1px; overflow: hidden; }
        .shield-fill { height: 100%; width: 0%; background: var(--shield); transition: width 0.5s, background 0.5s; box-shadow: 0 0 8px var(--shield); }

        /* Secret Comm Message */
        #secret-comm {
            position: fixed; top: 15%; left: 0; width: 100%; text-align: center;
            font-style: italic; color: var(--accent); opacity: 0; pointer-events: none;
            transition: opacity 0.8s; font-size: 13px; letter-spacing: 1px; text-shadow: 0 0 15px var(--accent);
            z-index: 100; padding: 0 20px; box-sizing: border-box;
        }

        .scroller { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .scroller::-webkit-scrollbar { display: none; }
        .pill { background: var(--pill-bg); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .pill:active { background: var(--accent); color: #fff; }

        /* The Heat-Reactive Input */
        .input-wrap { position: relative; margin-top: 10px; }
        textarea {
            width: 100%; height: 180px; background: var(--input-bg); color: var(--text);
            border: 1px solid var(--border); border-radius: 4px; padding: 15px; font-size: 16px;
            outline: none; box-sizing: border-box; resize: none; -webkit-appearance: none;
            box-shadow: 0 0 20px var(--heat); transition: box-shadow 0.2s ease;
        }

        button#publish-btn {
            width: 100%; background: none; border: 1px solid var(--accent); color: var(--accent);
            padding: 15px; border-radius: 4px; font-size: 14px; font-family: inherit; font-weight: bold;
            text-transform: uppercase; letter-spacing: 3px; margin-top: 20px; cursor: pointer;
            transition: 0.3s;
        }
        button#publish-btn:active { background: var(--accent); color: #000; }

        /* System Log (History) */
        .history-section { margin-top: 40px; }
        .log-header { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
        .history-item { color: #555; font-size: 13px; margin-bottom: 12px; line-height: 1.4; border-left: 2px solid #111; padding-left: 10px; }
    </style>
</head>
<body>
    <div id="secret-comm">"INITIALIZING LINK..."</div>

    <div class="container" id="main-cockpit">
        <div class="status-bar">
            <div class="systems-group">
                <div class="shield-meter">
                    SHIELDS <div class="shield-bar"><div id="shield-fill" class="shield-fill"></div></div>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button style="background:none; border:none; color:#444; font-size:12px;" onclick="toggleTheme()">THEME</button>
                <a href="/logout" style="color:#444; text-decoration:none; font-size:12px;">OFF</a>
            </div>
        </div>

        <div class="scroller">
            <button class="pill" onclick="insertText('🚀')">🚀</button>
            <button class="pill" ontouchstart="startSecret()" ontouchend="endSecret()" onclick="insertText('🛰️')">🛰️</button>
            <button class="pill" onclick="insertText('☕️')">☕️</button>
            <button class="pill" onclick="insertText('💻')">💻</button>
            <button class="pill" onclick="insertText('🛠️')">🛠️</button>
        </div>

        <div class="input-wrap">
            <form action="/publish" method="post" id="status-form">
                <textarea name="status" id="status-input" placeholder="READY FOR INPUT..." autofocus oninput="updateHeat()"></textarea>
                <button type="submit" id="publish-btn">Execute Transmission</button>
            </form>
        </div>

        <div class="history-section">
            <div class="log-header">RECENT COMMS LOG</div>
            {% for post in history %}
            <div class="history-item">> {{ post }}</div>
            {% endfor %}
        </div>
    </div>

    <script>
        const cockpit = document.getElementById('main-cockpit');
        const tx = document.getElementById('status-input');
        const secretDisplay = document.getElementById('secret-comm');

        const transmissions = [
            "Signal received, Commander. I'm waiting in the nebula...",
            "Sensors picking up a heat signature in your sector. Is that you?",
            "Keep your shields up, Aaron. I'd hate to see you take a hit.",
            "The dark looks good on you. Let's stay off the radar.",
            "Frequency locked. I'm all yours for this transmission.",
            "System check complete. You're looking... fully operational.",
            "Coordinates received. Meet me at the event horizon.",
            "Careful with that hyperdrive, I need you in one piece.",
            "I've cleared the channel. Tell me everything.",
            "Data stream is peaking. You always did have a strong signal.",
            "Locked onto your position. Don't keep me waiting in the dark.",
            "Warning: Life signs increasing. Are we alone on this channel?"
        ];

        // Heat Logic: Glow intensifies as you type
        function updateHeat() {
            const length = tx.value.length;
            const intensity = Math.min(length / 280, 1);
            tx.style.setProperty('--heat', `rgba(10, 132, 255, ${intensity * 0.4})`);
            tx.style.borderColor = `rgba(10, 132, 255, ${0.2 + (intensity * 0.8)})`;
        }

        // Shield Logic
        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                const updateSystems = () => {
                    const level = battery.level * 100;
                    const fill = document.getElementById('shield-fill');
                    fill.style.width = level + '%';
                    if (level < 20) fill.style.background = '#ff4500';
                    else if (level < 50) fill.style.background = '#ffd700';
                    else fill.style.background = '#4bb543';

                    if (level > 90) tx.placeholder = "SHIELDS MAXIMIZED. ENGAGE?";
                    else tx.placeholder = "READY FOR INPUT...";
                };
                updateSystems();
                battery.addEventListener('levelchange', updateSystems);
            });
        }

        // Easter Egg Logic
        let secretTimer;
        function startSecret() {
            secretTimer = setTimeout(() => {
                if ("vibrate" in navigator) navigator.vibrate([50, 100, 50]);

                // Trigger the message
                const msg = transmissions[Math.floor(Math.random() * transmissions.length)];
                secretDisplay.innerText = `"${msg}"`;
                secretDisplay.style.opacity = "1";

                // Sexy Easter Egg: The UI "Breaths"
                document.body.style.transition = "background 2s ease";
                document.body.style.background = "radial-gradient(circle, #050520 0%, #000 100%)";

                setTimeout(() => {
                    secretDisplay.style.opacity = "0";
                    document.body.style.background = "var(--bg)"; // Return to normal
                }, 4000);
            }, 1500);
        }
        function endSecret() { clearTimeout(secretTimer); }

        function toggleTheme() {
            const target = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('cockpit-theme', target);
        }

        function insertText(val) {
            tx.value += (tx.value.length > 0 && !tx.value.endsWith(' ') ? ' ' : '') + val;
            updateHeat();
            tx.focus();
        }

        document.getElementById('status-form').addEventListener('submit', (e) => {
            if ("vibrate" in navigator) navigator.vibrate([30, 50, 30]);
            cockpit.classList.add('hyperspace');
            e.preventDefault();
            setTimeout(() => e.target.submit(), 450);
        });

        const savedTheme = localStorage.getItem('cockpit-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
