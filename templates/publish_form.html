<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cockpit</title>

    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

    <style>
        :root {
            /* Default Dark (OLED) */
            --bg: #000;
            --text: #fff;
            --input-bg: #1c1c1e;
            --accent: #0a84ff;
            --border: #333;
            --pill-bg: #1c1c1e;
            --history-border: #111;
        }

        [data-theme="light"] {
            --bg: #f2f2f7;
            --text: #000;
            --input-bg: #fff;
            --accent: #007aff;
            --border: #d1d1d6;
            --pill-bg: #e5e5ea;
            --history-border: #e5e5ea;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            overscroll-behavior-y: contain;
            overflow-x: hidden;
            /* Fix for Dynamic Island / Notch */
            padding-top: env(safe-area-inset-top, 20px);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.6s cubic-bezier(0.5, 0, 0.5, 1), opacity 0.4s ease-in;
        }

        .hyperspace { transform: scale(0.1) translateY(-1000px); filter: blur(20px); opacity: 0; pointer-events: none; }

        .status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-top: 10px; }

        .controls-right { display: flex; align-items: center; gap: 15px; }

        /* Theme Toggle Button */
        .theme-toggle {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .dot-container { display: flex; align-items: center; gap: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.online { background: #4bb543; box-shadow: 0 0 8px #4bb543; }
        .dot.syncing { background: #ffd700; box-shadow: 0 0 8px #ffd700; }
        .dot.offline { background: #ff4500; box-shadow: 0 0 8px #ff4500; }

        .logout { color: #888; text-decoration: none; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .scroller { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .scroller::-webkit-scrollbar { display: none; }

        .pill { background: var(--pill-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 20px; font-size: 14px; white-space: nowrap; cursor: pointer; -webkit-appearance: none; }
        .pill.tag { color: var(--accent); font-weight: 500; }

        textarea {
            width: 100%;
            height: 160px;
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 15px;
            font-size: 18px;
            outline: none;
            box-sizing: border-box;
            resize: none;
            -webkit-appearance: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        textarea:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 20px rgba(10, 132, 255, 0.3);
        }

        #char-count { text-align: right; font-size: 12px; color: #888; margin-top: 8px; }

        button#publish-btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 600; margin-top: 20px; -webkit-appearance: none; cursor: pointer; }

        .history-section { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
        .history-item { color: #888; font-size: 15px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--history-border); }
    </style>
</head>
<body>
    <div class="container" id="main-cockpit">
        <div class="status-bar">
            <div class="dot-container">
                <div class="dot {{ git_status }}"></div>
                Systems {{ git_status }}
            </div>
            <div class="controls-right">
                <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌓</button>
                <a href="/logout" class="logout">Power Down</a>
            </div>
        </div>

        <div class="scroller">
            <button class="pill" onclick="insertText('🚀')">🚀</button>
            <button class="pill" onclick="insertText('🔫')">🔫</button>
            <button class="pill" onclick="insertText('☕️')">☕️</button>
            <button class="pill" onclick="insertText('💻')">💻</button>
            <button class="pill" onclick="insertText('🛰️')">🛰️</button>
            <button class="pill" onclick="insertText('🛠️')">🛠️</button>
            <button class="pill" onclick="insertText('✨')">✨</button>
        </div>

        <div class="scroller">
            <button class="pill tag" onclick="insertText('#movie')">#movie</button>
            <button class="pill tag" onclick="insertText('#book')">#book</button>
            <button class="pill tag" onclick="insertText('#music')">#music</button>
            <button class="pill tag" onclick="insertText('#idea')">#idea</button>
            <button class="pill tag" onclick="insertText('#coffee')">#coffee</button>
            <button class="pill tag" onclick="insertText('#tech')">#tech</button>
        </div>

        <form action="/publish" method="post" id="status-form">
            <textarea name="status" id="status-input" placeholder="Punch it, Chewie..." autofocus></textarea>
            <div id="char-count">0 / 280</div>
            <button type="submit" id="publish-btn">Publish</button>
        </form>

        <div class="history-section">
            {% for post in history %}
            <div class="history-item">{{ post }}</div>
            {% endfor %}
        </div>
    </div>

    <script>
        const tx = document.getElementById('status-input');
        const cockpit = document.getElementById('main-cockpit');

        // Theme Management
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('cockpit-theme', target);
            triggerHaptic('tap');
        }

        // Apply saved theme on boot
        const savedTheme = localStorage.getItem('cockpit-theme') ||
            (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Enhanced Haptics
        function triggerHaptic(type) {
            if ("vibrate" in navigator) {
                try {
                    if (type === 'tap') navigator.vibrate(15);
                    else if (type === 'publish') navigator.vibrate([40, 60, 40]);
                } catch(e) { console.log("Haptics blocked"); }
            }
        }

        function insertText(val) {
            triggerHaptic('tap');
            const space = (tx.value.length > 0 && !tx.value.endsWith(' ')) ? ' ' : '';
            tx.value += space + val + (val.startsWith('#') ? ' ' : '');
            tx.focus();
            localStorage.setItem('status_draft', tx.value);
            updateCount();
        }

        function updateCount() {
            const len = tx.value.length;
            document.getElementById('char-count').innerText = `${len} / 280`;
        }

        tx.value = localStorage.getItem('status_draft') || '';
        updateCount();

        tx.addEventListener('input', () => {
            localStorage.setItem('status_draft', tx.value);
            updateCount();
        });

        document.getElementById('status-form').addEventListener('submit', (e) => {
            triggerHaptic('publish');
            localStorage.removeItem('status_draft');
            cockpit.classList.add('hyperspace');
            e.preventDefault();
            setTimeout(() => e.target.submit(), 450);
        });
    </script>
</body>
</html>
