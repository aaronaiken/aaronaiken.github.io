<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BELOW DECK</title>

    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <style>
    :root {
        --bg:           #060806;
        --bg2:          #0a0c08;
        --amber:        #d4880a;
        --amber-hi:     #f5b332;
        --amber-lo:     #9a6018;
        --amber-dim:    #3d2804;
        --green:        #4dbb6a;
        --green-lo:     #2a6b3c;
        --red:          #cc3322;
        --text:         #c89040;
        --text-dim:     #7a5020;
        --border:       #1e1608;
        --border-hi:    #3a2c10;
        --muted:        #5a3c18;
        --input-bg:     #0a0c08;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        min-height: 100vh;
        padding: env(safe-area-inset-top, 20px) 0 40px;
        font-size: 14px;
        overscroll-behavior-y: contain;
    }

    .bd-container {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        padding: 24px 20px 60px;
    }

    @media (min-width: 768px) {
        .bd-container {
            margin-top: 40px;
            border: 1px solid var(--border);
        }
    }

    /* ---- HEADER ---- */
    .bd-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 28px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
    }

    .bd-title {
        font-family: 'VT323', monospace;
        font-size: 1.8rem;
        color: var(--amber-lo);
        letter-spacing: 0.06em;
        line-height: 1;
    }

    .bd-nav {
        display: flex;
        gap: 16px;
        align-items: center;
    }

    .bd-nav-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 0.6rem;
        font-family: 'Share Tech Mono', monospace;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        transition: color 0.15s;
        padding: 0;
        text-decoration: none;
    }

    .bd-nav-btn:hover { color: var(--amber-lo); }

    /* ---- ADD ROW ---- */
    .bd-add-row {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
    }

    .bd-add-row input[type="text"] {
        flex: 1;
        background: var(--input-bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 10px 14px;
        font-size: 0.9rem;
        font-family: 'Crimson Pro', Georgia, serif;
        outline: none;
        transition: border-color 0.15s;
        -webkit-appearance: none;
    }

    .bd-add-row input[type="text"]:focus { border-color: var(--amber-lo); }
    .bd-add-row input[type="text"]::placeholder { color: var(--border-hi); font-style: italic; }

    .bd-add-btn {
        background: none;
        border: 1px solid var(--border-hi);
        color: var(--text-dim);
        padding: 10px 16px;
        border-radius: 2px;
        font-size: 0.65rem;
        font-family: 'Share Tech Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .bd-add-btn:hover { border-color: var(--amber-lo); color: var(--amber); }
    .bd-add-btn.is-success { border-color: var(--green); color: var(--green); }

    /* ---- TASK LIST ---- */
    .bd-list {
        list-style: none;
    }

    .bd-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
        transition: opacity 0.2s;
        cursor: default;
        touch-action: none;
    }

    .bd-item.is-dragging {
        opacity: 0.4;
    }

    .bd-item.drag-over {
        border-top: 1px solid var(--amber-lo);
    }

    /* Drag handle */
    .bd-handle {
        color: var(--border-hi);
        font-size: 0.7rem;
        cursor: grab;
        padding: 2px 4px;
        flex-shrink: 0;
        user-select: none;
        -webkit-user-select: none;
        line-height: 1;
        letter-spacing: -1px;
    }

    .bd-handle:active { cursor: grabbing; }

    .bd-handle.touch-active {
        color: var(--amber-lo);
    }

    .bd-check {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        border: 1px solid var(--border-hi);
        border-radius: 2px;
        background: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        color: var(--green);
        font-size: 10px;
        line-height: 1;
    }

    .bd-check:hover { border-color: var(--green); }

    .bd-title-text {
        flex: 1;
        font-size: 0.92rem;
        color: var(--text);
        font-family: 'Crimson Pro', Georgia, serif;
        line-height: 1.4;
    }

    .bd-delete {
        background: none;
        border: none;
        color: var(--border-hi);
        font-size: 0.65rem;
        cursor: pointer;
        padding: 2px 4px;
        font-family: 'Share Tech Mono', monospace;
        transition: color 0.15s;
        flex-shrink: 0;
    }

    .bd-delete:hover { color: var(--red); }

    .bd-empty {
        font-family: 'Crimson Pro', serif;
        font-style: italic;
        color: var(--muted);
        font-size: 0.9rem;
        padding: 20px 0;
        text-align: center;
        opacity: 0.6;
    }

    /* ---- COMPLETE FLASH ---- */
    @keyframes bd-complete-flash {
        0%   { background: rgba(77,187,106,0.15); }
        100% { background: transparent; opacity: 0; }
    }

    .bd-item.completing {
        animation: bd-complete-flash 0.6s ease-out forwards;
        pointer-events: none;
    }

    /* ---- FOOTER ---- */
    .bd-footer {
        margin-top: 32px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        font-size: 0.55rem;
        color: var(--muted);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-align: center;
    }

    /* ---- LIGHT MODE ---- */
    @media (prefers-color-scheme: light) {
        :root {
            --bg:        #f5f0e8;
            --bg2:       #ede8dc;
            --amber:     #7a3e00;
            --amber-hi:  #5a2e00;
            --amber-lo:  #a06020;
            --amber-dim: #f0e6d0;
            --text:      #4a3818;
            --text-dim:  #8a7858;
            --border:    #d8cdb8;
            --border-hi: #c4b090;
            --muted:     #8a7858;
            --input-bg:  #ede8dc;
            --green:     #2a6e3f;
            --green-lo:  #4a8c60;
        }
        .bd-add-row input[type="text"] { color: #3a2a10; }
        .bd-add-row input[type="text"]::placeholder { color: #c4b090; }
    }
    </style>
</head>
<body>

<div class="bd-container">

    <div class="bd-header">
        <div class="bd-title">// BELOW DECK</div>
        <nav class="bd-nav">
            <button class="bd-nav-btn" onclick="window.location.reload()">REFRESH</button>
            <a class="bd-nav-btn" href="/publish">COCKPIT</a>
            <a class="bd-nav-btn" href="/logout">OFFLINE</a>
        </nav>
    </div>

    <div class="bd-add-row">
        <input type="text" id="bd-input" placeholder="Add a task..." maxlength="200" autocomplete="off">
        <button class="bd-add-btn" id="bd-add-btn" onclick="bdAdd()">+ ADD</button>
    </div>

    <ul class="bd-list" id="bd-list">
        {% if tasks %}
            {% for task in tasks %}
            {% if task.status == 'open' %}
            <li class="bd-item" data-id="{{ task.id }}" draggable="true">
                <span class="bd-handle" title="Drag to reorder">⠿</span>
                <button class="bd-check" onclick="bdComplete('{{ task.id }}')" title="Done"></button>
                <span class="bd-title-text">{{ task.title }}</span>
                <button class="bd-delete" onclick="bdDelete('{{ task.id }}')" title="Delete">✕</button>
            </li>
            {% endif %}
            {% endfor %}
        {% else %}
            <li class="bd-empty" id="bd-empty">Clear skies. Nothing below deck.</li>
        {% endif %}
    </ul>

    <div class="bd-footer">private · not published · aaronaiken.me</div>

</div>

<script>
    const bdList = document.getElementById('bd-list');

    // ---- ADD ----
    function bdAdd() {
        const input = document.getElementById('bd-input');
        const btn = document.getElementById('bd-add-btn');
        const title = input.value.trim();
        if (!title) return;

        input.value = '';
        const fd = new FormData();
        fd.append('title', title);

        fetch('/below-deck/add', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                if (!data.ok) throw new Error();
                bdPrepend(data.task);
                bdRemoveEmpty();
                btn.textContent = 'ADDED ✓';
                btn.classList.add('is-success');
                setTimeout(() => {
                    btn.textContent = '+ ADD';
                    btn.classList.remove('is-success');
                }, 1500);
                input.focus();
            })
            .catch(() => {
                input.value = title;
                input.focus();
            });
    }

    document.getElementById('bd-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); bdAdd(); }
    });

    // ---- COMPLETE ----
    function bdComplete(id) {
        const li = document.querySelector(`.bd-item[data-id="${id}"]`);
        if (!li) return;

        li.classList.add('completing');
        setTimeout(() => {
            const fd = new FormData();
            fd.append('id', id);
            fetch('/below-deck/complete', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(() => {
                    li.remove();
                    if (!bdList.querySelector('.bd-item')) bdShowEmpty();
                })
                .catch(() => li.classList.remove('completing'));
        }, 400);
    }

    // ---- DELETE ----
    function bdDelete(id) {
        const li = document.querySelector(`.bd-item[data-id="${id}"]`);
        if (!li) return;
        li.style.opacity = '0';
        li.style.transition = 'opacity 0.2s';
        setTimeout(() => {
            const fd = new FormData();
            fd.append('id', id);
            fetch('/below-deck/delete', { method: 'POST', body: fd })
                .then(() => {
                    li.remove();
                    if (!bdList.querySelector('.bd-item')) bdShowEmpty();
                });
        }, 200);
    }

    // ---- PREPEND ----
    function bdPrepend(task) {
        const li = document.createElement('li');
        li.className = 'bd-item';
        li.dataset.id = task.id;
        li.setAttribute('draggable', 'true');
        li.innerHTML = `
            <span class="bd-handle" title="Drag to reorder">⠿</span>
            <button class="bd-check" onclick="bdComplete('${task.id}')" title="Done"></button>
            <span class="bd-title-text">${escBd(task.title)}</span>
            <button class="bd-delete" onclick="bdDelete('${task.id}')" title="Delete">✕</button>
        `;
        bdAttachDrag(li);
        const first = bdList.querySelector('.bd-item');
        first ? bdList.insertBefore(li, first) : bdList.prepend(li);
    }

    function bdRemoveEmpty() {
        const e = document.getElementById('bd-empty');
        if (e) e.remove();
    }

    function bdShowEmpty() {
        const li = document.createElement('li');
        li.className = 'bd-empty';
        li.id = 'bd-empty';
        li.textContent = 'Clear skies. Nothing below deck.';
        bdList.appendChild(li);
    }

    function escBd(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ---- DRAG AND DROP ----
    let dragSrc = null;

    function bdAttachDrag(li) {
        li.addEventListener('dragstart', e => {
            dragSrc = li;
            li.classList.add('is-dragging');
            e.dataTransfer.effectAllowed = 'move';
        });

        li.addEventListener('dragend', () => {
            li.classList.remove('is-dragging');
            document.querySelectorAll('.bd-item').forEach(i => i.classList.remove('drag-over'));
            bdSaveOrder();
        });

        li.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (li !== dragSrc) {
                document.querySelectorAll('.bd-item').forEach(i => i.classList.remove('drag-over'));
                li.classList.add('drag-over');
            }
        });

        li.addEventListener('drop', e => {
            e.preventDefault();
            if (dragSrc && dragSrc !== li) {
                const items = [...bdList.querySelectorAll('.bd-item')];
                const srcIdx = items.indexOf(dragSrc);
                const tgtIdx = items.indexOf(li);
                if (srcIdx < tgtIdx) {
                    bdList.insertBefore(dragSrc, li.nextSibling);
                } else {
                    bdList.insertBefore(dragSrc, li);
                }
            }
        });

        // Touch drag — long press to grab
        let touchTimer = null;
        let touchDragging = false;
        let touchClone = null;
        let touchOffsetY = 0;

        li.addEventListener('touchstart', e => {
            const handle = e.target.closest('.bd-handle');
            if (!handle) return;
            touchTimer = setTimeout(() => {
                touchDragging = true;
                dragSrc = li;
                handle.classList.add('touch-active');
                li.classList.add('is-dragging');

                // Create a visual clone
                touchClone = li.cloneNode(true);
                touchClone.style.cssText = `
                    position: fixed;
                    left: ${li.getBoundingClientRect().left}px;
                    width: ${li.offsetWidth}px;
                    background: var(--bg2);
                    border: 1px solid var(--amber-lo);
                    opacity: 0.9;
                    pointer-events: none;
                    z-index: 9999;
                    padding: 12px 0;
                    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
                `;
                touchOffsetY = e.touches[0].clientY - li.getBoundingClientRect().top;
                touchClone.style.top = (e.touches[0].clientY - touchOffsetY) + 'px';
                document.body.appendChild(touchClone);

                if (navigator.vibrate) navigator.vibrate(30);
            }, 500);
        }, { passive: true });

        li.addEventListener('touchmove', e => {
            if (!touchDragging) { clearTimeout(touchTimer); return; }
            e.preventDefault();
            const y = e.touches[0].clientY;
            if (touchClone) touchClone.style.top = (y - touchOffsetY) + 'px';

            // Find which item we're hovering over
            const items = [...bdList.querySelectorAll('.bd-item:not(.is-dragging)')];
            items.forEach(i => i.classList.remove('drag-over'));
            const target = items.find(i => {
                const r = i.getBoundingClientRect();
                return y >= r.top && y <= r.bottom;
            });
            if (target) target.classList.add('drag-over');
        }, { passive: false });

        li.addEventListener('touchend', e => {
            clearTimeout(touchTimer);
            if (!touchDragging) return;
            touchDragging = false;

            if (touchClone) { touchClone.remove(); touchClone = null; }
            li.classList.remove('is-dragging');
            document.querySelectorAll('.bd-handle').forEach(h => h.classList.remove('touch-active'));

            const y = e.changedTouches[0].clientY;
            const items = [...bdList.querySelectorAll('.bd-item:not(.is-dragging)')];
            items.forEach(i => i.classList.remove('drag-over'));
            const target = items.find(i => {
                const r = i.getBoundingClientRect();
                return y >= r.top && y <= r.bottom;
            });

            if (target && target !== li) {
                const allItems = [...bdList.querySelectorAll('.bd-item')];
                const srcIdx = allItems.indexOf(li);
                const tgtIdx = allItems.indexOf(target);
                if (srcIdx < tgtIdx) {
                    bdList.insertBefore(li, target.nextSibling);
                } else {
                    bdList.insertBefore(li, target);
                }
            }

            dragSrc = null;
            bdSaveOrder();
        });
    }

    function bdSaveOrder() {
        const order = [...bdList.querySelectorAll('.bd-item')].map(li => li.dataset.id);
        fetch('/below-deck/reorder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order })
        }).catch(() => {});
    }

    // ---- INIT DRAG ON EXISTING ITEMS ----
    document.querySelectorAll('.bd-item').forEach(li => bdAttachDrag(li));
</script>

</body>
</html>
